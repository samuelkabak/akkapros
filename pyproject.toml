[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "akkapros"
version = "1.0.0"
description = "Akkadian accentuation reconstruction toolkit"
readme = "README.md"
authors = [{name = "Samuel KABAK", email = "samuel.kabak@gmail.com"}]
license = {text = "MIT License"}
requires-python = ">=3.8"
dependencies = [
    # Only what your project directly needs
    # DiaMoE-TTS is called externally, not imported
    # "boto3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black",
    "flake8",
    "sox",
]

[tool.setuptools]
packages = ["akkapros", "akkatts"]
package-dir = {"" = "src"}

[tool.pytest.ini_options]
minversion = "6.0"
testpaths = ["tests"]
python_files = "test_*.py"