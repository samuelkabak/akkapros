[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "akkapros"
version = "1.0.0"
description = "Akkadian accentuation reconstruction toolkit"
readme = "README.md"
authors = [{name = "Samuel KABAK", email = "samuel.kabak@gmail.com"}]
license = {text = "MIT License"}
requires-python = ">=3.8"
dependencies = [
    # Only what your project directly needs
    # DiaMoE-TTS is called externally, not imported
    # "boto3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black",
    "flake8",
]

[tool.setuptools]
packages = ["akkapros", "akkatts"]
package-dir = {"" = "src"}

[project.scripts]
# Console entry points for installed CLIs
akkapros-fullreparer = "akkapros.cli.fullreparer:main"
akkapros-syllabifier = "akkapros.cli.syllabifier:main"
akkapros-repairer = "akkapros.cli.repairer:main"
akkapros-metricser = "akkapros.cli.metricser:main"
akkapros-atfparser = "akkapros.cli.atfparser:main"
akkapros-printer = "akkapros.cli.printer:main"
akkatts-phoneprep = "akkatts.cli.phoneprep:main"

[tool.pytest.ini_options]
minversion = "6.0"
testpaths = ["tests"]
python_files = "test_*.py"