# Package-wide Akkadian Prosody Toolkit configuration.
# This file uses the repository's restricted YAML subset: nested mappings,
# scalars, and JSON-style lists.
# Common keys apply across file-producing CLIs.
# fullprosmaker reads common plus the syllabify, prosody, phonetize, metrics,
# and print sections.

# Shared run options used across file-producing CLIs.
common:
  run:
    # Shared output prefix used by file-producing CLIs.
    prefix: "akkapros"
    # Shared output directory used by file-producing CLIs.
    outdir: "."
    # Suppress informational console logging while keeping warnings and errors
    # visible.
    quiet: false
    # Disable console logging entirely.
    no_console: false
    # Optional runtime log file path.
    log: null
    # Append to the configured log file instead of overwriting it.
    log_append: false

# Options specific to the atfparser CLI, grouped into process and run controls.
atfparse:
  process:
    # Remove sign-boundary hyphens in cleaned output.
    remove_hyphens: false
    # Preserve case from the source ATF transliteration.
    preserve_case: false
    # Preserve original h/H characters.
    preserve_h: false
  run:
    # Enable informational warnings while parsing.
    strict: false
    # Append to output files instead of overwriting them; each appended block
    # starts on a new line.
    append: false

# Options used by the syllabifier CLI and by fullprosmaker during the syllabify
# stage, grouped into process and run controls.
syllabify:
  process:
    # Additional characters to treat as vowels.
    extra_vowels: ""
    # Additional characters to treat as consonants.
    extra_consonants: ""
    # Additional short-pause punctuation characters.
    extra_short_punct_chars: ""
    # Additional long-pause punctuation characters.
    extra_long_punct_chars: ""
    # Repeatable regexes for short-pause punctuation segments.
    extra_short_punct_pattern: []
    # Repeatable regexes for long-pause punctuation segments.
    extra_long_punct_pattern: []
    # Regex used to recognize numbers; empty uses the built-in English-grouping-
    # compatible pattern.
    number_format: ""
    # Merge hyphens into syllable separators.
    merge_hyphen: false
    # Merge lines instead of preserving source line structure.
    merge_lines: false
  run:
    # Override inherited or missing file title in output front matter.
    title: null

# Options used by the prosmaker CLI and by fullprosmaker during the prosody stage.
prosody:
  process:
    # Accent style for prosody realization.
    style: "lob"
    # Mora-mode gate for accentuation attempts.
    mora_mode: "bi"
    # For explicit + links, allow prosody realization propagation before the last
    # linked word.
    relax_last: false

# Options used by the phonetizer CLI and by fullprosmaker during the phonetize stage.
phonetize:
  process:
    # Must be true to enable experimental phonetizer features. Currently guarded
    # features: limit_emphatic_coloring: true (limit coloring to onset‑only) and
    # enable_resync_pause: true. Set to false to block experimental features and
    # cause verification failure if any are enabled.
    allow_experimental: false
    realization:
      # When true, limit emphatic vowel coloring to the legacy onset‑only rule
      # (non‑experimental). When false, enable same‑syllable emphatic‑coda
      # coloring and immediate next‑syllable carry (experimental).
      limit_emphatic_coloring: false
    intonation:
      # Baseline speaker pitch in Hertz used for emitted .pho rows.
      f0: 120
      # Compact intonation preset for non-pause-governed stressed syllables.
      # Normalized to canonical row token form.
      stress: "H2"
      # Compact intonation preset for question-final contours. Normalized to
      # canonical row token form.
      question: "H3"
      # Compact intonation preset for statement-final contours. Normalized to
      # canonical row token form.
      statement: "L2"
      # Compact intonation preset for exclamatory contours. Normalized to
      # canonical row token form.
      exclamation: "H4"
      # Compact intonation preset for continuation contours. Normalized to
      # canonical row token form.
      continuation: "H1"
    timing_model:
      # geminate realization policy
      # - cumulative: keep coda duration + onset duration instead of correcting to the
      # configured geminate target
      # - corrective: correct the sequence to the configured geminate target
      geminate_policy: "corrective"
      # this policy indicates how the accentuation mora (0.5 * cvc_reference) is
      # distributed, format N_M
      # N = percentage on the accentuated segment; M = percentage on the adjacent
      # segment
      # When legality caps block the full target, the solver preserves the
      # configured ratio, realizes the largest legal proportional increment, and
      # carries the remaining shortfall into drift.
      # Allowed values: 100_0, 95_05, 90_10, 85_15, 80_20, 75_25, 70_30
      accentuation_distribution_policy: "80_20"
      # maximum local timing mismatch tolerated before the algorithm must fail
      drift_tolerance: 19
      # Enable algorithmic resynchronization-pause insertion at eligible
      # non-punctuation boundaries.
      enable_resync_pause: false
      durations:
        # Global multiplier applied to all other numeric duration leaves when
        # different from 1.0. Runtime treats 1.0 as a true no-op path.
        scale: 1.0
        # Upper ordinary duration for one vowel or consonant. Model-facing ceiling from
        # comparative duration limits; used as a validation ceiling for class-local
        # consonant gemination maxima and the vowel elongation max.
        segmental_ceiling: 310
        # Global validation floor for vowel minima, consonant anchors and minima, and
        # the hiatus and vowel-transition special realizations. Validation-only; not a
        # runtime timing control.
        segmental_floor: 20
        # Central heavy-syllable timing reference used by accentuation and pause
        # alignment. Set inside the empirically grounded CVC interval 286-306 ms. This
        # keeps the control value conservative and compatible with pause-band alignment
        # whenever at least one integer multiple N * cvc_reference falls inside a
        # configured pause band.
        cvc_reference: 300
        # Additional duration in milliseconds attributed to accentuated syllables in
        # mono mora mode. Unlike bi mode where accentuation adds one mora
        # (0.5 * cvc_reference), mono mode uses this smaller configurable elongation.
        # Default: 50 ms. Validation range: [0, round(0.5 * cvc_reference)].
        mono_mode_accentuation_lengthening: 50
        consonants:
          # Stop-like closure class. Includes lexical ʾ.
          closure:
            # Default onset closure duration. Direct comparative stop-closure anchor.
            onset: 89
            # Default post-vocalic closure duration. Direct comparative coda/post-
            # vocalic stop anchor.
            coda: 87
            # Default pre-pausal final closure duration. Used only when the next
            # realized unit is a punctuation-owned short or long pause.
            coda_final: 87
            # Default geminate closure target. Summary point for the attested stop-
            # geminate band.
            geminate: 175
            # Corrective same-consonant coda share used when geminate_policy is
            # corrective. The onset side receives the exact remainder of the selected
            # pair total.
            geminate_coda_ratio: 0.6
            special_realization:
              # Hiatus or zero-onset marker between adjacent vowels. Unstressed light
              # glottal-stop realization; stressed cases defer to full geminated closure
              # timing.
              hiatus: 35
            perception_limits:
              # Earliest closure duration treated as geminate-like. Perceptual threshold
              # from the stop singleton/geminate contrast, not the lowest measured
              # token.
              geminate_min: 145
              # Latest closure duration treated as the legal runtime geminate-like
              # maximum. Runtime same-consonant saturation and accent-extension ceilings
              # use this class-local bound.
              gemination_max: 260
          # Fricative class. Heavier than closures by manner, but less directly grounded
          # than the stop row.
          fricative:
            # Default onset fricative duration. Derived from closure onset plus
            # fricative manner delta.
            onset: 115
            # Default post-vocalic fricative duration. Current heavy post-vocalic anchor
            # used by the simplified row.
            coda: 112
            # Default pre-pausal final fricative duration. Used only when the next
            # realized unit is a punctuation-owned short or long pause.
            coda_final: 112
            # Default geminate fricative target. Exploratory value based on the current
            # onset + post-vocalic row.
            geminate: 210
            # Corrective same-consonant coda share used when geminate_policy is
            # corrective. The onset side receives the exact remainder of the selected
            # pair total.
            geminate_coda_ratio: 0.6
            perception_limits:
              # Earliest fricative duration treated as held or geminate-like. Class-
              # specific perceptual floor from weak fricative gemination evidence.
              geminate_min: 163
              # Latest fricative duration treated as the legal runtime geminate-like
              # maximum. Runtime same-consonant saturation and accent-extension ceilings
              # use this class-local bound.
              gemination_max: 290
          # Sonorant, nasal, and glide class.
          sonorant:
            # Default onset sonorant duration. Set from the clearer singleton liquid
            # onset anchor.
            onset: 105
            # Default post-vocalic sonorant duration. Structural minimum retained on the
            # coda side of the row.
            coda: 100
            # Default pre-pausal final sonorant duration. Used only when the next
            # realized unit is a punctuation-owned short or long pause.
            coda_final: 100
            # Default geminate sonorant target. Set from the direct glide geminate
            # region.
            geminate: 190
            # Corrective same-consonant coda share used when geminate_policy is
            # corrective. The onset side receives the exact remainder of the selected
            # pair total.
            geminate_coda_ratio: 0.6
            special_realization:
              # Diphthong-internal or glide-like VV transition marker. Unstressed light
              # glide realization; stressed cases defer to full geminated glide timing.
              vowel_transition: 25
            perception_limits:
              # Earliest sonorant duration treated as geminate-like. Lower perceptual
              # boundary from moraic nasal/liquid comparison.
              geminate_min: 148
              # Latest sonorant duration treated as the legal runtime geminate-like
              # maximum. Runtime same-consonant saturation and accent-extension ceilings
              # use this class-local bound.
              gemination_max: 275
        vowels:
          # Default short-vowel duration. Production anchor from the retained short-
          # vowel baseline.
          short: 110
          # Default pre-pausal final short-vowel duration. Used only when the next
          # realized unit is a punctuation-owned short or long pause.
          short_final: 110
          # Default long-vowel duration. Production anchor from the retained long-vowel
          # baseline.
          long: 160
          # Default pre-pausal final long-vowel duration. Used only when the next
          # realized unit is a punctuation-owned short or long pause. Ordinary
          # downward recovery in that context must not go below this anchor.
          long_final: 160
          # Default very-long vowel duration. Contextual extension anchor, not ordinary
          # lexical default.
          very_long: 260
          perception_limits:
            # Minimum duration still treated as a realized short-vowel nucleus.
            short_min: 60
            # Earliest duration treated as long. Midpoint-style boundary derived from
            # short and long anchors.
            long_min: 153
            # Earliest duration treated as very long. Midpoint-style boundary derived
            # from long and very-long anchors. Ordinary non-accentual long-vowel
            # recovery must stop at very_long_min - 1, while accent-bearing CVV:
            # and CVV:C cleanup may continue above this threshold.
            very_long_min: 233
            # Upper contextual bound for vowel extension. Ordinary non-accentual
            # long-vowel recovery still stops at very_long_min - 1, but post-
            # accent cleanup on accent-bearing CVV: and CVV:C syllables may use
            # this wider legality ceiling.
            elongation_max: 280 
        pauses:
          # Default resync-pause band. Non-punctuation recovery gap used only when one
          # legal resync duration lands the stream on an equivalent beat checkpoint:
          # directly to 0 for negative drift, or to +cvc_reference for positive drift
          # before the hard-coded beat fold maps that checkpoint back to 0.
          resync:
            # Minimum resync-pause duration.
            min: 100
            # Maximum resync-pause duration.
            max: 200
          # Default short-pause band. Empirically grounded short-pause region from
          # comparative studies. Rhythmic alignment remains possible when at least one
          # integer multiple N * cvc_reference falls inside this band without redefining
          # the empirical range.
          short:
            # Minimum short-pause duration.
            min: 520
            # Maximum short-pause duration.
            max: 680
          # Default long-pause band. Clause-boundary range from comparative pause data.
          # If rhythmic alignment is used, enumerate all integer multiples N *
          # cvc_reference inside this band. Choose the candidate nearest the band
          # center; if two are equally near, choose the smaller one.
          long:
            # Minimum long-pause duration.
            min: 1100
            # Maximum long-pause duration.
            max: 1780

# Options used by the metricalc CLI and by fullprosmaker for metrics output selection.
metrics:
  run:
    # Write human-readable metrics table output.
    table: false
    # Write JSON metrics output.
    json: false

# Options used by the printer CLI and by fullprosmaker for print outputs, grouped into
# process and run controls.
print:
  process:
    # IPA proto-Semitic policy: preserve=Old Akkadian, replace=Old Babylonian merger.
    ipa_proto_semitic: "preserve"
  run:
    # Write <prefix>_accent_acute.txt.
    acute: false
    # Write <prefix>_accent_bold.md.
    bold: false
    # Write <prefix>_accent_ipa.txt using phonetizer-owned vowel realizations.
    ipa: false
    # Speculative IPA mode: split circumflex vowels into hiatus (for example qû ->
    # qʊ.ʊ).
    circ_hiatus: false
    # Write both <prefix>_accent_xar.txt and <prefix>_xar.txt.
    xar: false
    # Render the visible merge connector in supported outputs.
    print_merger: false
