[pytest]
addopts = -s
markers =
	unit: Fast, isolated unit tests with no subprocess or multi-stage I/O.
	integration: Tests that invoke subprocesses or multi-stage CLI pipelines.
	slow: Tests whose wall-clock cost exceeds typical unit test budget (>5 s).
	config_impact: Tests that exercise config loading, schema, or path resolution.
	critical_path: Tests that exercise the core pipeline (syllabify -> prosody -> phonetize -> metrics).
	docs_only: Tests that check documentation consistency without pipeline execution.
	metrics_impact: Tests that exercise metrics computation.
	phonetize_impact: Tests that exercise the phonetizer timing model.
	prosody_impact: Tests that exercise prosody realization logic.
